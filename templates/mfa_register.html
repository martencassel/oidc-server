{{ define "mfa_register.html" }}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Set up MFA</title>

<style>
    :root {
        --bg: #f5f7fa;
        --card-bg: #ffffff;
        --primary: #2563eb;
        --primary-hover: #1e4fc7;
        --border: #e5e7eb;
        --text: #111827;
        --text-light: #6b7280;
        --radius: 10px;
        --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: var(--text);
    }

    .card {
        background: var(--card-bg);
        padding: 2rem;
        width: 100%;
        max-width: 420px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
    }

    h1 {
        margin-top: 0;
        margin-bottom: 0.5rem;
        font-size: 1.6rem;
        text-align: center;
        font-weight: 600;
    }

    .subtitle {
        text-align: center;
        font-size: 0.95rem;
        color: var(--text-light);
        margin-bottom: 1.5rem;
    }

    .qr-container {
        display: flex;
        justify-content: center;
        margin-bottom: 1.5rem;
    }

    .secret-box {
        background: #f3f4f6;
        padding: 0.75rem;
        border-radius: var(--radius);
        font-family: monospace;
        text-align: center;
        margin-bottom: 1.5rem;
        font-size: 1rem;
        letter-spacing: 0.1rem;
    }

    .input-group {
        margin-bottom: 1rem;
    }

    label {
        display: block;
        margin-bottom: 0.4rem;
        font-size: 0.9rem;
        color: var(--text-light);
    }

    input {
        width: 100%;
        padding: 0.7rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 1rem;
        box-sizing: border-box;
        text-align: center;
        letter-spacing: 0.2rem;
    }

    button {
        width: 100%;
        padding: 0.75rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: var(--radius);
        font-size: 1rem;
        cursor: pointer;
        margin-top: 0.5rem;
        transition: background 0.2s ease;
    }

    button:hover {
        background: var(--primary-hover);
    }

    .error {
        background: #fee2e2;
        color: #b91c1c;
        padding: 0.75rem;
        border-radius: var(--radius);
        margin-bottom: 1rem;
        font-size: 0.9rem;
        text-align: center;
    }

    @media (max-width: 480px) {
        .card {
            margin: 1rem;
            padding: 1.5rem;
        }
    }
</style>
</head>

<body>
<div class="card">

    <h1>Set up MFA</h1>
    <div class="subtitle">Scan the QR code with your authenticator app</div>

    {{ if .error }}
    <div class="error">{{ .error }}</div>
    {{ end }}

    <div class="qr-container">
        <img src="data:image/png;base64,{{ .qr_base64 }}" alt="QR Code">
    </div>

    <div class="subtitle">Or enter this secret manually:</div>

    <div class="secret-box">{{ .secret }}</div>

    <form method="POST">
        <div class="input-group">
            <label for="code">Enter the 6‑digit code</label>
            <input id="code" name="code" maxlength="6" autocomplete="one-time-code">
        </div>

        <input type="hidden" name="return_to" value="{{ .return_to }}">
        <input type="hidden" name="username" value="{{ .username }}">

        <button type="submit">Activate MFA</button>
    </form>

</div>
</body>
</html>
{{ end }}
